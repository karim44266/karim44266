  <rect x="0" y="0" width="490" height="216" rx="10" fill="#0d1117"
        stroke="#30363d" stroke-width="1" />
  
  <rect x="0" y="0" width="490" height="34" rx="8" fill="#30363d" />
  <circle cx="18" cy="17" r="5" fill="#ff5f56" />
  <circle cx="36" cy="17" r="5" fill="#ffbd2e" />
